# Last forced rebuild: 2026-03-10 — ensures dist/index.cjs is recompiled from source
[phases.setup]
nixPkgs = ["nodejs_22", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "npm ci",
  "pip install --break-system-packages fastapi uvicorn playwright pydantic aiohttp httpx requests pillow qrcode",
  "python3 -m playwright install chromium --with-deps"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "sh scripts/start.sh"
